<!DOCTYPE html>
<html>

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Weather Web - Remastered</title>
	<link rel='stylesheet' href='style.css'>
</head>

<body>
	<div id='bg'></div>
		
	<div id='main'>
		
		<main>
		
			<aside>
					
				<div>
					<p class='side-up'>Humidty</p>
					<input class='down' id='hum' readonly>
				</div>
				
				<div>
					<p class='side-up'>Wind Speed</p>
					<input class='down' id='ws' readonly>
				</div>
			
				<div>
					<p class='side-up'>Wind Direction</p>
					<input class='down' id='wd' readonly>
				</div>
			
			</aside>
		
			<section id='main-box'>
				<span id='weather-display'>#</span>
				<span id='weatherT-display'>--</span>
				<span id='temp-display'>--</span>
			</section>
		
		</main>
	
		<footer>
			<form>
				
				<div class='unit-con'>
					<label>Temperature Unit</label>
					<select id='unit-input'>
						<option value='C'>C (Celsius)</option>
						<option value='F'>F (Farenheit)</option>
						<option value='R'>R (Reamur)</option>
						<option value='K'>K (Kelvin)</option>
					</select>
				</div>
				
				<div class='unit-con'>
					<label>Location</label>
					<select id='loc-input'>
						<option value='A'>Auto</option>
						<option value='LL'>Latitude/Longitude</option>
						<option value='AD'>Address</option>
					</select>
				</div>
				
				<div id='A-Displayer' class='show'>
					
					<h2>Auto</2>
					<h3>Automaticly Locate Your Location</h2>
				
				</div>
			
				<div id='LL-Displayer' class='hide'>
					
					<div class='input'>
						<label for='Lat-Input'>Latitude</label>
						<input type='number' id='Lat-Input'>
					</div>
					
					<div class='input'>
						<label for='Lon-Input'>Longitude</label>
						<input type='number' id='Lon-Input'>
					</div>
				
				</div>
				
				<div id='AD-Displayer' class='hide'>
					
					<div class='input'>
						<label for='Ad-input'>Address</label>
						<input type='text' id='Ad-input'>
					</div>
					
				</div>
		
			</form>
		</footer>
		
		<button onclick='Main()' id='special-button'>Submit</button>
		
	</div>
	
	<script src='script.js'></script>
</body>

</html>
